services:
  bgp-monitor:
    build: .
    container_name: rpki-guardian-monitor
    restart: unless-stopped
    #Disabling for multicontainer setup, can be enabled without issues.
    #ports:
    #  - "8080:8080"
    volumes:
      - ${HOST_CONFIG_PATH}:/app/config.json:ro
      - rpki_data:/data/rpki:ro
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  routinator:
    image: nlnetlabs/routinator:latest
    container_name: rpki-guardian-routinator
    # We run as root initially to ensure we can write to the volume mount if needed,
    # but the files created will be readable by the bgp-monitor user.
    user: root
    restart: unless-stopped
    entrypoint: |
      sh -c '
      CACHE_FILE="/data/rpki/routinator_roas.json"
      if [ -f "$$CACHE_FILE" ] && [ $$(stat -c%s "$$CACHE_FILE") -gt 30000000 ]; then
        echo "[Routinator] Found existing complete RPKI cache. Skipping initial blocking sync."
      else
        echo "[Routinator] No complete RPKI cache found. Performing initial blocking sync/dump..."
        rm -f "$$CACHE_FILE"
        routinator --repository-dir /data/rpki/repository vrps -f json -o "$$CACHE_FILE"
        chmod 644 "$$CACHE_FILE"
      fi
      routinator --repository-dir /data/rpki/repository server --detach
      while true; do
        sleep 600
        echo "[Routinator] Periodic dump of VRPs to JSON..."
        routinator --repository-dir /data/rpki/repository vrps -n -f json -o "$$CACHE_FILE"
        chmod 644 "$$CACHE_FILE"
      done
      '
    volumes:
      - rpki_data:/data/rpki

volumes:
  rpki_data:
